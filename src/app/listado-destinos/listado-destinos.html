<div class="container	content">
    <div class="row">
        <div class="col-md-6	offset-md-3">
            <span class="anchor" id="formLogin"></span>
            <!-- form	card	login	with	validation	feedback	-->
            <div class="card	card-outline-secondary">
                <div class="card-header">
                    <h3 class="mb-0">Whishlist</h3>
                </div>
                <div class="card-body">
                    <app-form-destino-viaje></app-form-destino-viaje>
                </div>
            </div>
        </div>
    </div>
    <hr class="mb-5">
      <div class="row mb-3">
    <div class="col">
      <button class="btn btn-warning" (click)="resetVotos()">
         Resetear todos los votos
      </button>
    </div>
  </div>
    <div class="row row-flex">
        <div class="col-md-3" *ngFor="let destino of all;  let i = index">
            <app-destino-viaje  [destino]="destino" 
                [idx]="i+1"
                [esFavorito]="destino.isSelected()"
                (clicked)="elegido(destino)">
            </app-destino-viaje>
            <button class="btn btn-danger btn-sm mt-1 w-100" (click)="eliminar(destino)">
                Eliminar
            </button>
        </div>
    </div>

    <hr class="mb-5">
    <div class="row row-flex">
        <h5>Actividad</h5>
        <ul>
            <li *ngFor="let u of updates">{{ u }}</li>
        </ul>
    </div>
</div>
